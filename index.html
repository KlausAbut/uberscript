<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uberscript</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4 text-center">Commande de repas</h1>

      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <p id="wallet" class="fw-bold mb-2">Solde : 0 €</p>
          <p id="totalSpent" class="mb-2">Total dépensé : 0 €</p>
          <p id="error" class="text-danger mb-0"></p>
        </div>
      </div>

      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <label for="filterPrice" class="form-label"
            >Filtrer par prix maximum</label
          >
          <input
            id="filterPrice"
            type="number"
            step="0.01"
            class="form-control"
            placeholder="Ex: 12"
          />
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5">Repas disponibles</h2>
              <ul id="mealList" class="list-group"></ul>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h5">Historique des commandes</h2>
              <ul id="orderHistory" class="list-group"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
